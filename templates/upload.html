{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4 p-5 bg-white">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-warning">📂 Milestone Upload</h2>
            <p class="text-muted">Upload project reports, synopsis, and milestone files.</p>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Project</label>
                {{ form.project }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Stage</label>
                {{ form.stage }}
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Upload File</label>
                {{ form.file }}
            </div>

            <div class="text-center">
                <button class="btn btn-warning px-5 py-2 rounded-pill">
                    Upload Milestone
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
