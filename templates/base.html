{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart academic workflow for project registration, guide allotment, milestone tracking and evaluation.">
    <title>Student Project Tracker</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom Styles -->
    <link href="{% static 'style.css' %}" rel="stylesheet">
</head>

<body>

    <!-- ─── Floating Glassmorphic Navbar ─── -->
    <nav class="navbar navbar-expand-lg navbar-glass">
        <a class="navbar-brand" href="/">
            <i class="bi bi-mortarboard-fill"></i> ProjectTracker
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent"
            aria-controls="navContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navContent">
            <div class="ms-auto d-flex align-items-center gap-2 flex-wrap mt-2 mt-lg-0">
                <a href="/" class="nav-link-pill">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </a>
                <a href="/register/" class="nav-link-pill">
                    <i class="bi bi-pencil-square"></i> Register
                </a>
                <a href="/upload/" class="nav-link-pill">
                    <i class="bi bi-cloud-arrow-up-fill"></i> Upload
                </a>
                <a href="/evaluate/" class="nav-link-pill">
                    <i class="bi bi-star-fill"></i> Evaluate
                </a>
                <a href="/projects-list/" class="nav-link-pill">
                    <i class="bi bi-folder2-open"></i> Projects
                </a>
                <a href="/admin/" class="nav-btn-admin">
                    <i class="bi bi-gear-fill"></i> Admin
                </a>
            </div>
        </div>
    </nav>

    <!-- ─── Main Content ─── -->
    <div class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>

    <!-- ─── Footer ─── -->
    <footer class="footer-glass">
        Built with <i class="bi bi-heart-fill" style="color: var(--accent-rose);"></i> for Academic Excellence &middot;
        <a href="/admin/">Admin Panel</a>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
