{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="glass-card-static animate-in">

            <!-- Page Header -->
            <div class="page-header">
                <h2><i class="bi bi-person-badge-fill"></i> <span class="gradient-text">Guide Allotment</span></h2>
                <p>Assign a faculty guide to <strong>{{ project.title }}</strong>.</p>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-4 animate-in delay-1">
                    <label class="form-label">Select Guide</label>
                    {{ form.guide }}
                </div>

                <div class="text-center mt-4 animate-in delay-2">
                    <button class="btn-glow emerald" type="submit">
                        <i class="bi bi-person-check-fill"></i> Assign Guide
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

{% endblock %}
