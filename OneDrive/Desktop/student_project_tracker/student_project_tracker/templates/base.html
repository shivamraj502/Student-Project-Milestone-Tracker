{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Student Project Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'style.css' %}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand fw-bold" href="/">🎓 Project Tracker</a>

        <div class="ms-auto d-flex gap-2">
            <a href="/register/" class="btn btn-outline-light btn-sm">Register</a>
            <a href="/upload/" class="btn btn-outline-warning btn-sm">Upload</a>
            <a href="/evaluate/" class="btn btn-outline-danger btn-sm">Evaluate</a>
            <a href="/projects-list/" class="btn btn-outline-success btn-sm">Projects</a>
            <a href="/admin/" class="btn btn-warning btn-sm">Admin</a>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
