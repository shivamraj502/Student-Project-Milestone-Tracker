{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4 p-5 bg-white">

        <div class="text-center mb-4">
            <h2 class="fw-bold text-danger">⭐ Project Evaluation</h2>
            <p class="text-muted">Guide reviews uploaded milestone quality before approval.</p>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Project</label>
                {{ form.project }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Guide Rating</label>
                {{ form.guide_rating }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Comments</label>
                {{ form.comments }}
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Ready for Publication</label>
                {{ form.publication_status }}
            </div>

            <div class="text-center">
                <button class="btn btn-danger px-5 py-2 rounded-pill">
                    Submit Evaluation
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}
